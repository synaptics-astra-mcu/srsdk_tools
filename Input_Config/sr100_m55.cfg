# =========================
# SR110 SWD (SRST allowed, assert on connect)
# =========================
# Works with CMSIS-DAP by default. Allow SRST on connect to release DP if held.

set _CHIPNAME       "SR110"
set _TARGETNAME     "$_CHIPNAME.m55"
set _DAPNAME        "$_CHIPNAME.dap"
set _APNUM          0x00010000         
set _WORKAREA_ADDR  0x33F20000     
set _WORKAREA_SIZE  0x00004000

# ----- Probe Selection -----
# Choose via:  -c "set PROBE jlink"   or   PROBE=jlink openocd -f m55.cfg
if {[info exists PROBE]} {
    set _ADAPTER_DRIVER $PROBE
} else {
    set _ADAPTER_DRIVER "cmsis-dap"   
}

# -------- Probe / Transport --------
if { $_ADAPTER_DRIVER eq "cmsis-dap" } {
    adapter driver cmsis-dap
    transport select swd
    adapter speed 1000
} elseif { $_ADAPTER_DRIVER eq "jlink" } {
    adapter driver jlink
    transport select swd
    adapter speed 8000
} else {
    echo "Unknown adapter driver: $_ADAPTER_DRIVER"
    shutdown
}


swd newdap $_CHIPNAME cpu -irlen 4
dap create $_DAPNAME -chain-position $_CHIPNAME.cpu -adiv6
target create $_TARGETNAME cortex_m -endian little -dap $_DAPNAME -ap-num $_APNUM

# Configure work area
$_TARGETNAME configure -work-area-phys $_WORKAREA_ADDR -work-area-size $_WORKAREA_SIZE -work-area-backup 0

reset_config srst_only srst_nogate connect_assert_srst
adapter srst pulse_width 5
cortex_m reset_config sysresetreq



# Minimal hook usage; rely on explicit reset/halt below.
$_TARGETNAME configure -event examine-start {}
$_TARGETNAME configure -event examine-end   {}

# Program registers after any reset, then halt.

init
targets $_TARGETNAME

halt

cortex_m vector_catch reset
reset_config none
reset halt

